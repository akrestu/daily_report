<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6efd">
    <title>Offline - SiGAP</title>
    <link rel="icon" href="/icons/icon-192x192.png?v=2.0" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .icon-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(13, 110, 253, 0.7);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 20px rgba(13, 110, 253, 0);
            }
        }

        .icon-container svg {
            width: 60px;
            height: 60px;
            fill: white;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .offline-features {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .offline-features h3 {
            font-size: 18px;
            color: #0d6efd;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .offline-features ul {
            list-style: none;
            padding: 0;
        }

        .offline-features li {
            padding: 8px 0;
            color: #555;
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        .offline-features li:before {
            content: "✓";
            display: inline-block;
            width: 24px;
            height: 24px;
            background: #d1e7dd;
            color: #0f5132;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            margin-right: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .retry-button {
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.4);
        }

        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13, 110, 253, 0.6);
        }

        .retry-button:active {
            transform: translateY(0);
        }

        .network-status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .network-status.offline {
            background: #f8d7da;
            color: #842029;
        }

        .network-status.online {
            background: #d1e7dd;
            color: #0f5132;
        }

        @media (max-width: 576px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            p {
                font-size: 14px;
            }

            .icon-container {
                width: 100px;
                height: 100px;
            }

            .icon-container svg {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
                <path d="M12 21l-2-2h4l-2 2z" opacity="0.3"/>
            </svg>
        </div>

        <h1>Anda Sedang Offline</h1>
        <p>Sepertinya koneksi internet Anda terputus. Beberapa fitur masih dapat diakses secara offline.</p>

        <div class="offline-features">
            <h3>Yang Dapat Anda Lakukan:</h3>
            <ul>
                <li>Melihat halaman yang sudah pernah dibuka</li>
                <li>Membaca laporan yang sudah di-cache</li>
                <li>Melihat data yang tersimpan secara lokal</li>
            </ul>
        </div>

        <button class="retry-button" onclick="window.location.reload()">
            Coba Lagi
        </button>

        <div class="network-status offline" id="networkStatus">
            <span id="statusText">Tidak ada koneksi internet</span>
        </div>
    </div>

    <script>
        // Check network status
        function updateNetworkStatus() {
            const statusDiv = document.getElementById('networkStatus');
            const statusText = document.getElementById('statusText');

            if (navigator.onLine) {
                statusDiv.className = 'network-status online';
                statusText.textContent = 'Koneksi tersedia! Klik "Coba Lagi" untuk melanjutkan.';
            } else {
                statusDiv.className = 'network-status offline';
                statusText.textContent = 'Tidak ada koneksi internet';
            }
        }

        // Listen for online/offline events
        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);

        // Auto-reload when connection is restored
        window.addEventListener('online', () => {
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });

        // Check status on load
        updateNetworkStatus();
    </script>
</body>
</html>
